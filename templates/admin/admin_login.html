{% csrf_token %}
<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Dashboard</title>
  <!-- plugins:css -->
  <link rel="stylesheet" href="/static/admin/vendors/feather/feather.css">
  <link rel="stylesheet" href="/static/admin/vendors/ti-icons/css/themify-icons.css">
  <link rel="stylesheet" href="/static/admin/vendors/css/vendor.bundle.base.css">
  <!-- endinject -->
  <!-- Plugin css for this page -->
  <link rel="stylesheet" href="/static/admin/vendors/datatables.net-bs4/dataTables.bootstrap4.css">
  <link rel="stylesheet" href="/static/admin/vendors/ti-icons/css/themify-icons.css">
  <link rel="stylesheet" type="text/css" href="/static/admin/js/select.dataTables.min.css">
  <!-- End plugin css for this page -->
  <!-- inject:css -->
  <link rel="stylesheet" href="/static/admin/css/vertical-layout-light/style.css">
  <!-- endinject -->
  <link rel="shortcut icon" href="/static/admin/images/favicon.png" />
</head>

<body>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: linear-gradient(135deg, #667eea, #764ba2);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      color: #fff;
    }

    .login-card h2 {
      text-align: center;
      margin-bottom: 25px;
      font-weight: 600;
    }

    .form-control {
      border-radius: 10px;
      border: none;
      padding: 12px;
      margin-bottom: 15px;
    }

    .form-control:focus {
      box-shadow: none;
      outline: none;
    }

    .btn-login {
      width: 100%;
      border-radius: 10px;
      padding: 10px;
      background: #fff;
      color: #333;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn-login:hover {
      background: #eee;
    }

    .link a {
      color: #fff;
      text-decoration: underline;
    }
  </style>

  <div class="login-container">
    <div class="login-card">
      <h2>Welcome Back</h2>

      <form>
        <div>
          <input type="email" class="form-control" id="txtEmail" placeholder="Enter Email">
        </div>

        <div>
          <input type="password" class="form-control" id="txtPassword" placeholder="Enter Password">
        </div>

        <button type="button" id="btn_submit" class="btn btn-login">Login</button>

        <hr style="background: #fff;">

        <p class="link text-center mt-3">
          <a href="/index/">Go to Website</a>
        </p>
      </form>
    </div>
  </div>
  <!-- container-scroller -->

  <!-- plugins:js -->
  <script src="/static/admin/vendors/js/vendor.bundle.base.js"></script>
  <!-- endinject -->
  <!-- Plugin js for this page -->
  <script src="/static/admin/vendors/chart.js/Chart.min.js"></script>
  <script src="/static/admin/vendors/datatables.net/jquery.dataTables.js"></script>
  <script src="/static/admin/vendors/datatables.net-bs4/dataTables.bootstrap4.js"></script>
  <script src="/static/admin/js/dataTables.select.min.js"></script>

  <!-- End plugin js for this page -->
  <!-- inject:js -->
  <script src="/static/admin/js/off-canvas.js"></script>
  <script src="/static/admin/js/hoverable-collapse.js"></script>
  <script src="/static/admin/js/template.js"></script>
  <script src="/static/admin/js/settings.js"></script>
  <script src="/static/admin/js/todolist.js"></script>
  <!-- endinject -->
  <!-- Custom js for this page-->
  <script src="/static/admin/js/dashboard.js"></script>
  <script src="/static/admin/js/Chart.roundedBarCharts.js"></script>
  <!-- End custom js for this page-->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
</body>

</html>

<script type="text/javascript">
  $("#btn_submit").click(function (e) {
    //verification
    if ($("#txtEmail").val().trim().length < 1) {
      alert("Please Enter Email");
      $("#txtEmail").focus();
      return false;
    }

    if ($("#txtPassword").val().trim().length < 1) {
      alert("Please Enter Password");
      $("#txtPassword").focus();
      return false;
    }

    let formData = new FormData();
    formData.append("txtEmail", $("#txtEmail").val());
    formData.append("txtPassword", $("#txtPassword").val());
    formData.append("csrfmiddlewaretoken", $('input[name=csrfmiddlewaretoken]').val());

    $.ajax({
      beforeSend: function () {
        $(".btn .spinner-border").show();
        // $("#login").attr("disabled", true);
      },
      url: "/admin_login_details/",
      type: "POST",
      data: formData,
      processData: false,
      contentType: false,
      success: function (response) {
        // alert(result);
        if(response == '0') {
          alert("Invalid Email OR Password");
        } else {

          if(response == "Admin") {
            window.location = "/admin_master";
          } else if(response == "PG") {
            window.location = "/add_pg";
          }
          
        }
        // location.reload();
      },
      error: function (request, error) {
        console.error(error);
      },
      complete: function () {
        $(".btn .spinner-border").hide();
        $("#btn_add").attr("disabled", false);
      },
    });
});
</script>
